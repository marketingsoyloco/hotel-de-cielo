name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - v1
      - v2

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trigger branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build available versions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site

          for version in v1 v2; do
            if git ls-remote --exit-code --heads origin "$version" > /dev/null; then
              echo "Building $version"
              git clone --depth 1 --branch "$version" "https://github.com/${GITHUB_REPOSITORY}.git" "$version-src"
              (
                cd "$version-src"
                npm ci
                PAGES_BASE_PATH="/hotel-de-cielo/$version/" npm run build
              )
              mkdir -p "site/$version"
              cp -R "$version-src/dist/." "site/$version/"
            else
              echo "Skipping $version because branch does not exist yet"
            fi
          done

          if [ ! -f site/index.html ]; then
            cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Hotel de Cielo</title>
              <meta http-equiv="refresh" content="0; url=./v1/" />
            </head>
            <body>
              <a href="./v1/">Abrir Hotel de Cielo v1</a>
            </body>
          </html>
          HTML
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
