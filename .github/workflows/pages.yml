name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build v1 and v2 paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site

          (
            cd apps/v1
            npm ci
            PAGES_BASE_PATH="/hotel-de-cielo/v1/" npm run build
          )
          mkdir -p site/v1
          cp -R apps/v1/dist/. site/v1/

          V2_DIR=""
          if [ -f v2/package.json ]; then
            V2_DIR="v2"
          elif [ -f V2/package.json ]; then
            V2_DIR="V2"
          fi

          if [ -n "$V2_DIR" ]; then
            (
              cd "$V2_DIR"
              npm ci
              PAGES_BASE_PATH="/hotel-de-cielo/v2/" npm run build
            )
            mkdir -p site/v2
            cp -R "$V2_DIR/dist/." site/v2/
          else
            mkdir -p site/v2
            cat > site/v2/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Hotel de Cielo v2</title>
              <style>
                body {
                  align-items: center;
                  background: #081722;
                  color: #cbbba0;
                  display: flex;
                  font-family: Inter, Arial, sans-serif;
                  justify-content: center;
                  margin: 0;
                  min-height: 100vh;
                  text-align: center;
                }
                main { max-width: 560px; padding: 32px; }
                h1 { font-family: Georgia, serif; font-size: clamp(2rem, 8vw, 4rem); margin: 0 0 12px; }
                p { color: rgba(255,255,255,.76); line-height: 1.6; }
                a { color: #cbbba0; font-weight: 700; }
              </style>
            </head>
            <body>
              <main>
                <h1>Hotel de Cielo v2</h1>
                <p>A segunda versão da landing page está em preparação.</p>
                <a href="../v1/">Ver versão v1</a>
              </main>
            </body>
          </html>
          HTML
          fi

          if [ ! -f site/index.html ]; then
            cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Hotel de Cielo</title>
              <meta http-equiv="refresh" content="0; url=./v1/" />
            </head>
            <body>
              <a href="./v1/">Abrir Hotel de Cielo v1</a>
            </body>
          </html>
          HTML
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
